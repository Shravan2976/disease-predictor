<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Disease Predictor</title>

    <style>

        :root {
            font-family: Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #0ea5e9);
        }

        .card {
            width: 400px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .field input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .register-link {
            margin-top: 20px;
            text-align: center;
        }

        .register-link a {
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }

        .hint {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }

    </style>
</head>

<body>

    <div class="card">

        <h1>LOGIN</h1>

        <div class="field">
            <label>Username</label>
            <input
                type="text"
                id="username"
                placeholder="Enter username"
            />
        </div>

        <div class="field">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter password"
            />
        </div>

        <button class="button" onclick="login()">
            Login
        </button>

        <div class="register-link">
            <a href="/register.html">
                Create New Account
            </a>
        </div>

        <p class="hint">
            Register to save symptoms and predictions.
        </p>

    </div>

    <script>

        async function login() {

            const username =
                document.getElementById("username").value.trim();

            const password =
                document.getElementById("password").value;

            if (!username || !password) {

                alert("Please enter username and password");

                return;
            }

            try {

                const res = await fetch("/login", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        username,
                        password
                    })
                });

                const data = await res.json();

                if (data.success) {

                    alert("Login Successful");

                    window.location.href = "/dashboard.html";

                } else {

                    alert(data.message || "Login failed");
                }

            } catch (error) {

                console.error(error);

                alert("Server Error");
            }
        }

    </script>

</body>
</html>
