<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Disease Predictor</title>

    <style>

        :root {
            font-family: Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #0ea5e9);
            padding: 20px;
        }

        .card {
            width: 450px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .login-link {
            margin-top: 20px;
            text-align: center;
        }

        .login-link a {
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }

        .hint {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }

    </style>
</head>

<body>

    <div class="card">

        <h1>REGISTER</h1>

        <form id="registerForm">

            <div class="field">
                <label>First Name</label>
                <input
                    type="text"
                    id="firstName"
                    placeholder="Enter first name"
                    required
                />
            </div>

            <div class="field">
                <label>Last Name</label>
                <input
                    type="text"
                    id="lastName"
                    placeholder="Enter last name"
                    required
                />
            </div>

            <div class="field">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    required
                />
            </div>

            <div class="field">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    required
                />
            </div>

            <div class="field">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    required
                />
            </div>

            <div class="field">
                <label>Phone Number</label>
                <input
                    type="text"
                    id="phone"
                    placeholder="Enter phone number"
                    required
                />
            </div>

            <div class="field">
                <label>Address</label>
                <input
                    type="text"
                    id="address"
                    placeholder="Enter address"
                    required
                />
            </div>

            <div class="field">
                <label>Date of Birth</label>
                <input
                    type="date"
                    id="dob"
                    required
                />
            </div>

            <div class="field">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <button type="submit" class="button">
                Register
            </button>

        </form>

        <div class="login-link">
            <a href="/login.html">
                Already have an account? Login
            </a>
        </div>

        <p class="hint">
            Create your account to access the Disease Prediction System.
        </p>

    </div>

    <script>

        document.getElementById("registerForm")
        .addEventListener("submit", async function(e) {

            e.preventDefault();

            const userData = {

                firstName:
                    document.getElementById("firstName").value.trim(),

                lastName:
                    document.getElementById("lastName").value.trim(),

                username:
                    document.getElementById("username").value.trim(),

                email:
                    document.getElementById("email").value.trim(),

                password:
                    document.getElementById("password").value,

                phone:
                    document.getElementById("phone").value.trim(),

                address:
                    document.getElementById("address").value.trim(),

                dob:
                    document.getElementById("dob").value,

                gender:
                    document.getElementById("gender").value
            };

            try {

                const res = await fetch("/register", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(userData)
                });

                const data = await res.json();

                if (data.success) {

                    alert("Registration Successful");

                    window.location.href = "/login.html";

                } else {

                    alert(data.message || "Registration Failed");
                }

            } catch (error) {

                console.error(error);

                alert("Server Error");
            }

        });

    </script>

</body>
</html>
